<div class="ventas-dashboard">
  <header class="page-header">
    <h1>Certificados</h1>
    <p>Seleccione el tipo de certificado a generar hoy.</p>
  </header>

  <div class="options-grid">
    @for (item of navIcons; track $index) {
      <div class="menu-card" [routerLink]="[item.routerLink]">
        <div class="icon-box blue">
          <i [ngClass]="item.icon"></i>
        </div>
        <div class="card-content">
          <h3>{{ item.label }}</h3>
          <p>{{ item.detalle }}</p>
        </div>
        <div class="arrow-indicator">
          <i class="fas fa-chevron-right"></i>
        </div>
      </div>
    }
  </div>
</div>
